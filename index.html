<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Style Stream Overlay - Animated</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, 'Pyidaungsu', 'Noto Sans Myanmar', sans-serif;
            overflow: hidden;
        }

        .overlay-wrapper {
            margin-bottom: 50px;
            position: relative;
            display: flex;
            align-items: center;
            animation: floatBox 6s ease-in-out infinite;
            padding: 0 20px;
            max-width: 90vw;
        }

        @keyframes floatBox {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .overlay-container {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 18px 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-width: 280px;
            width: 100%;
            text-align: center;
        }

        .text-content {
            color: #F5F5F7;
            font-size: clamp(18px, 3.2vw, 28px);
            font-weight: 500;
            line-height: 1.5;
            letter-spacing: 0.5px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0px);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-hidden {
            opacity: 0;
            transform: translateY(15px) scale(0.92);
            filter: blur(8px);
        }

        /* အောက်ခြေ အခြေအနေပြဘား */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34C759;
            animation: pulse 1.5s ease-in-out infinite;
            margin-right: 6px;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        .status-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.8px;
        }

        @media (max-width: 480px) {
            .overlay-wrapper {
                margin-bottom: 30px;
            }
            .overlay-container {
                padding: 14px 20px;
                border-radius: 18px;
                min-width: auto;
            }
            .text-content {
                min-height: 44px;
                font-size: clamp(15px, 4vw, 20px);
            }
        }
    </style>
</head>
<body>

    <div class="overlay-wrapper">
        <div class="overlay-container">
            <div id="stream-text" class="text-content">
                YouTube: @VorSoloYT
            </div>
            
        </div>
    </div>

    <script>
        const messages = [
            "YouTube: @VorSoloYT",
            "Uc/Dia ဝယ်လို့လိုပါက Tg: @vorsolo_shop",
            "YouTube channel ကို subscribe မလုပ်ရသေးရင် subscribe လုပ်ပေးသွားပါအုံးခင်ဗျ",
            "Like မလုပ်ရသေးရင် like လေးတွေလုပ်ပေးသွားပါအုံးဗျ"
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('stream-text');

        function changeText() {
            textElement.classList.add('text-hidden');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % messages.length;
                textElement.innerText = messages[currentIndex];
                textElement.classList.remove('text-hidden');
            }, 650);
        }

        // 6 စက္ကန့်တစ်ခါ ပြောင်း (ပိုမြန်အောင် ချိန်ညှိ)
        setInterval(changeText, 6000);

        // စာမျက်နှာပေါ်လာချိန်မှာ ပထမစာသား သေချာပေါ်အောင်
        window.addEventListener('load', function() {
            textElement.classList.remove('text-hidden');
        });
    </script>

</body>
</html>
