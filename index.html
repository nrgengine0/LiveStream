<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vorsolo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            display: flex;
            align-items: flex-end; 
            justify-content: flex-start; /* အလယ်ကနေ ဘယ်ဘက်ထောင့်ကို ရွှေ့လိုက်သည် */
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, 'Pyidaungsu', 'Noto Sans Myanmar', sans-serif;
            overflow: hidden;
        }

        .overlay-wrapper {
            margin-left: 40px; /* ဘယ်ဘက်အစွန်းမှ အနည်းငယ်ခွာထားရန် */
            margin-bottom: 50px;
            position: relative;
            display: flex;
            align-items: center;
            animation: floatBox 6s ease-in-out infinite; 
        }

        @keyframes floatBox {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .overlay-container {
            background: rgba(30, 30, 30, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            padding: 16px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            text-align: left; /* စာသားကို ဘယ်ဘက်ညှိထားသည် */
        }

        .text-content {
            color: #F5F5F7; 
            font-size: 24px;
            font-weight: 500;
            line-height: 1.5;
            letter-spacing: 0.5px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0px);
        }

        .text-hidden {
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="overlay-wrapper">
        <div class="overlay-container">
            <div id="stream-text" class="text-content">
                YouTube: @VorSoloYT
            </div>
        </div>
    </div>

    <script>
        const messages = [
            "YouTube: @VorSoloYT",
            "Telegram: @vorsolo_shop",
            "Uc/Dia များဝယ်လိုပါက Tg: @VorSolo001",
            "YouTube channel ကို subscribe မလုပ်ရသေးရင် \nsubscribe လုပ်ပေးသွားပါအုံးခင်ဗျ",
            "Like မလုပ်ရသေးရင် like လေးတွေလုပ်ပေးသွားပါအုံးဗျ"
        ];

        let currentIndex = 0;
        const textElement = document.getElementById('stream-text');

        function changeText() {
            textElement.classList.add('text-hidden');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % messages.length;
                textElement.innerText = messages[currentIndex];
                textElement.classList.remove('text-hidden');
            }, 600);
        }

        setInterval(changeText, 7000);
    </script>

</body>
</html>
